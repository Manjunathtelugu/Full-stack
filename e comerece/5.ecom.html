<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini E-Commerce</title>
    <link rel="stylesheet" href="./css/ecom.css">
</head>
<body>

    <header>
        <h1>Mini E-Commerce</h1>
        <button id="cartBtn">🛒 Cart (<span id="cartCount">0</span>)</button>
    </header>

    <main>
        <h2>Products</h2>

        <div class="product-container">

            <div class="product">
                <img src="./images/e1.png" alt="product 1">
                <h3>Smart Watch</h3>
                <p>Price: ₹1500</p>
                <button onclick="addToCart('Smart Watch', 1500)">Add to Cart</button>
            </div>

            <div class="product">
                <img src="./images/e2.png" alt="Product 2">
                <h3>Headphones</h3>
                <p>Price: ₹1200</p>
                <button onclick="addToCart('Headphones', 1200)">Add to Cart</button>
            </div>

            <div class="product">
                <img src="./images/e3.png" alt="Product 3">
                <h3>Mobile Cover</h3>
                <p>Price: ₹500</p>
                <button onclick="addToCart('Mobile Cover', 500)">Add to Cart</button>
            </div>

        </div>

        <section class="cart-section">
            <h2>Cart Items</h2>
            <ul id="cartItems"></ul>
            <h3 id="totalPrice">Total: ₹0</h3>
            <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
        </section>

    </main>

    <script src="ecom.html"></script>

</body>
</html>
